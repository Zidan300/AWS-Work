<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;scroll-behavior:smooth}

body{
background:linear-gradient(135deg,#f9fbff,#fff6fd,#f4fff8);
color:#111827;
overflow-x:hidden;
}

.hero-bg{
position:fixed;
inset:0;
z-index:-1;
background:
radial-gradient(circle at 20% 20%,rgba(88,166,255,.18),transparent 30%),
radial-gradient(circle at 80% 30%,rgba(90,167,255,.18),transparent 30%),
radial-gradient(circle at 50% 80%,rgba(90,167,255,.12),transparent 30%);
filter:blur(50px);
animation:floatbg 12s ease-in-out infinite alternate;
}

@keyframes floatbg{
100%{transform:scale(1.2) translateY(-30px)}
}

nav{
position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);
padding:14px 28px;
display:flex;
justify-content:center;
align-items:center;
backdrop-filter:blur(30px);
background:rgba(255,255,255,.22);
border:1px solid rgba(255,255,255,.45);
border-radius:999px;
box-shadow:0 10px 40px rgba(0,0,0,.06);
z-index:1000;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
align-items:center;
}

nav a{
text-decoration:none;
color:#111827;
font-weight:600;
padding:8px 16px;
border-radius:999px;
transition:.35s;
font-size:16px;
}

nav a:hover{
background:rgba(255,255,255,.65);
transform:translateY(-3px) scale(1.08);
box-shadow:0 10px 30px rgba(88,166,255,.18);
}

html,body{
height:100%;
overflow:hidden;
}

.cube-scene{
position:fixed;
inset:0;
perspective:3200px;
overflow:hidden;
}

.cube{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
}

.face{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding-top:90px;
opacity:0;
transition:opacity .6s ease, transform .6s ease;
border-radius:28px;
margin:18px;
width:calc(100vw - 36px);
height:calc(100vh - 36px);
box-shadow:0 25px 80px rgba(0,0,0,.10);
transform:scale(.98) translateY(20px);
background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
}

.face.active{
opacity:1;
transform:scale(1) translateY(0);
z-index:2;
}

.face-1{
background:#ffffff;
margin:0;
width:100vw;
height:100vh;
border-radius:0;
box-shadow:none;
}
.face-2{background:transparent;}
.face-3{background:transparent;}
.face-4{background:transparent;}

.home-video{
position:absolute;
inset:0;
padding:18px;
box-sizing:border-box;
}
.face-1 .home-video{
padding:0;
}

.home-video video{
width:100%;
height:100%;
object-fit:cover;
border-radius:24px;
transform:scale(0.95);
}
.face-1 .home-video video{
border-radius:0;
transform:scale(1);
width:100%;
height:100%;
object-fit:cover;
}

.about-wrapper{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
max-width:900px;
text-align:center;
opacity:0;
filter:blur(18px);
transition:.8s;
}

.about-wrapper.active{
opacity:1;
filter:blur(0);
}

.about-photo-ring{
width:300px;
height:420px;
border-radius:28px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,rgba(255,255,255,.25),rgba(255,255,255,.08));
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.4);
box-shadow:0 20px 60px rgba(90,167,255,.25);
overflow:hidden;
}

.about-photo-placeholder{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
background:rgba(255,255,255,.25);
border-radius:28px;
}

.about-content h2{
font-size:3.8rem;
background:linear-gradient(90deg,#5aa7ff,#8ec5ff,#eaf4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.about-content p{
font-size:1.4rem;
line-height:1.8;
opacity:.85;
max-width:760px;
}

</style>
</head>

<body>

<div class="hero-bg"></div>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="cube-scene">
<div class="cube">

<section class="face face-1 active">
<div class="home-video">
<video autoplay muted loop playsinline>
<source src="welcome.mp4" type="video/mp4">
</video>
</div>
</section>

<section class="face face-2">
<div class="about-wrapper">
<div class="about-photo-ring">
<div class="about-photo-placeholder">Your Photo</div>
</div>

<div class="about-content">
<h2>About Me</h2>
<p>
Creative developer focused on immersive digital experiences and premium UI design.
</p>
</div>
</div>
</section>

<section class="face face-3"></section>
<section class="face face-4"></section>

</div>
</div>

<script>
let currentFace = 0;
let animating = false;

const navLinks = document.querySelectorAll('nav a');
const aboutWrapper = document.querySelector('.about-wrapper');

function goToFace(target){
if(animating) return;
animating = true;

currentFace = target;

document.querySelectorAll('.face').forEach(f => f.classList.remove('active'));

const el = document.querySelector('.face-' + (target+1));
if(el) el.classList.add('active');

if(aboutWrapper){
if(target === 1) aboutWrapper.classList.add('active');
else aboutWrapper.classList.remove('active');
}

setTimeout(()=>animating=false,600);
}

navLinks.forEach((a,i)=>{
a.addEventListener('click', e=>{
e.preventDefault();
goToFace(i);
});
});

window.addEventListener('wheel', e=>{
if(animating) return;
if(Math.abs(e.deltaY)<10) return;

if(e.deltaY>0 && currentFace===0) goToFace(1);
if(e.deltaY<0 && currentFace===1) goToFace(0);

},{passive:false});
</script>

</body>
</html>
